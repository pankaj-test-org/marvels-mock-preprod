name: CI/CD Pipeline from Github

on:
  push

env:
  CLOUDBEES_URL: ${{ vars.CLOUDBEES_API_URL || 'https://api.saas-preprod.beescloud.com' }}
  IMAGE_NAME: pankajydev/gha-test-image

jobs:
  run-maven-tests:
    name: Run Maven Unit Tests
    runs-on: ubuntu-latest
    if: vars.SKIP_GHA != 'true'
    permissions:
      id-token: write
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven tests
        run: |
          echo "Running Maven tests..."
          mvn -B clean test

          # Check if build should fail
          if [[ "${{ vars.GH_CHECK_FAIL }}" == "true" ]]; then
            echo "⚠️ GH_CHECK_FAIL=true - failing intentionally"
            exit 1
          else
            echo "✅ Tests passed"
          fi

      - name: Publish test results to CloudBees
        uses: cloudbees-io-gha/publish-test-results@v1
        if: always()
        env:
          CLOUDBEES_API_TOKEN: ${{ secrets.CLOUDBEES_API_TOKEN }}
          CLOUDBEES_API_URL: ${{ env.CLOUDBEES_URL }}
          TEST_TYPE: 'JUNIT'
          FOLDER_PATH: 'target/surefire-reports'
        with:
          cloudbees-url: ${{ env.CLOUDBEES_URL }}
          test-type: 'JUNIT'
          results-path: 'target/surefire-reports'

  build-and-register-artifact:
    name: Build Docker Image & Register Artifact
    runs-on: ubuntu-latest
    needs: [run-maven-tests]
    if: vars.SKIP_GHA != 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_id: ${{ steps.register-artifact.outputs.cbp_artifact_id }}
      image_digest: ${{ steps.get-digest.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version number
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$VERSION" >> $GITHUB_ENV
          echo "Generated version: $VERSION"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Get Docker image digest
        id: get-digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --format '{{json .Manifest}}' | jq -r .digest)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "IMAGE_DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "Image digest: ${DIGEST}"

      - name: Register artifact with CloudBees
        id: register-artifact
        uses: cloudbees-io-gha/register-build-artifact@v3
        with:
          cloudbees-url: ${{ env.CLOUDBEES_URL }}
          name: gha-test-image
          url: "docker.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          version: ${{ env.IMAGE_TAG }}
          digest: ${{ env.IMAGE_DIGEST }}
          type: docker
          label: "pan1"

      - name: Publish build evidence to CloudBees
        uses: cloudbees-io-gha/publish-evidence-item@v1
        env:
          CLOUDBEES_API_TOKEN: ${{ secrets.CLOUDBEES_API_TOKEN }}
        with:
          cloudbees-url: ${{ env.CLOUDBEES_URL }}
          content: |-
            # Build Evidence Report

            ## Artifact Details
            - **Repository**: ${{ github.repository }}
            - **Version**: ${{ env.IMAGE_TAG }}
            - **Artifact ID**: ${{ steps.register-artifact.outputs.cbp_artifact_id }}
            - **Type**: Docker Image
            - **Branch**: ${{ github.ref_name }}

            ## Build Configuration
            - **Image**: `${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}`
            - **Digest**: `${{ env.IMAGE_DIGEST }}`
            - **Architecture**: ${{ runner.arch }}
            - **OS**: ${{ runner.os }}

            ## Quality Gates
            - **Unit Tests**: ✅ Passed
            - **Maven Build**: ✅ Completed
            - **Docker Build**: ✅ Published

            ## Workflow Summary
            - **Commit**: ${{ github.sha }}
            - **Run Number**: ${{ github.run_number }}
            - **Triggered by**: ${{ github.event_name }}
            - **Actor**: ${{ github.actor }}
          format: "MARKDOWN"

  deploy-to-environment:
    name: Deploy Application to Environment
    runs-on: ubuntu-latest
    needs: [build-and-register-artifact]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy application
        run: |
          echo "Deploying version ${{ needs.build-and-register-artifact.outputs.version }}"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-register-artifact.outputs.version }}"
          echo "Digest: ${{ needs.build-and-register-artifact.outputs.image_digest }}"
          echo "Deployment completed successfully"

      - name: Register deployed artifact with CloudBees
        uses: cloudbees-io-gha/register-deployed-artifact@v0
        with:
          cloudbees-url: ${{ env.CLOUDBEES_URL }}
          artifact-id: ${{ needs.build-and-register-artifact.outputs.artifact_id }}
          target-environment: pan101
          labels: pan1

      - name: Publish deployment evidence to CloudBees
        uses: cloudbees-io-gha/publish-evidence-item@v1
        env:
          CLOUDBEES_API_TOKEN: ${{ secrets.CLOUDBEES_API_TOKEN }}
        with:
          cloudbees-url: ${{ env.CLOUDBEES_URL }}
          content: |-
            # Deployment Evidence

            ## Deployment Details
            - **Version**: ${{ needs.build-and-register-artifact.outputs.version }}
            - **Environment**: pan101
            - **Artifact ID**: ${{ needs.build-and-register-artifact.outputs.artifact_id }}
            - **Image**: `${{ env.IMAGE_NAME }}:${{ needs.build-and-register-artifact.outputs.version }}`
            - **Digest**: `${{ needs.build-and-register-artifact.outputs.image_digest }}`

            ## Workflow Info
            - **Run ID**: ${{ github.run_id }}
            - **Deployed by**: ${{ github.actor }}
            - **Commit**: ${{ github.sha }}
          format: "MARKDOWN"

      - name: Debug Job Name
        run: |
          echo "Job ID is: ${{ github.job }}"
          # This looks up the job name in the github context map
          echo "Job Name is: ${{ job.check_run_id }}"
